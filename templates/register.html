{% extends "base.html" %}
{% block title %}Registro | Predictor Mundial Cuervo{% endblock %}
{% block content %}
<section class="auth-card">
    <p class="eyebrow">Alta de jugador</p>
    <h1>Crear cuenta</h1>
    <form method="post" class="form-card">
        <label>Usuario<input name="username" required autocomplete="username"></label>
        <label>Email<input name="email" type="email" required autocomplete="email"></label>
        <label>Contrasena<input name="password" type="password" required autocomplete="new-password"></label>
        <button class="button primary" type="submit">Competir</button>
    </form>
    <p class="muted">Ya tienes cuenta? <a href="{{ url_for('auth.login') }}">Ingresar</a></p>
</section>
{% endblock %}
