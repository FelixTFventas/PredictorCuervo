{% extends "base.html" %}
{% block title %}Admin Partido | Predictor Mundial Cuervo{% endblock %}
{% block content %}
<section class="page-head">
    <p class="eyebrow">{{ "Editar" if match.id else "Nuevo" }} partido</p>
    <h1>Ficha del partido</h1>
</section>
<form method="post" class="form-card admin-form">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="form-grid">
        <label>Equipo local<input name="home_team" value="{{ match.home_team or '' }}" required></label>
        <label>Equipo visitante<input name="away_team" value="{{ match.away_team or '' }}" required></label>
        <label>Fecha y hora<input type="datetime-local" name="starts_at" value="{{ match.starts_at|local_datetime('%Y-%m-%dT%H:%M') if match.starts_at else '' }}" required></label>
        <label>Estado
            <select name="status">
                {% for status in statuses %}
                    <option value="{{ status }}" {% if match.status == status %}selected{% endif %}>{{ status }}</option>
                {% endfor %}
            </select>
        </label>
        <label>Grupo<input name="group_name" value="{{ match.group_name or 'Fase de grupos' }}"></label>
        <label>Ronda<input name="round_name" value="{{ match.round_name or 'Fecha por confirmar' }}"></label>
        <label>Fase<input name="stage" value="{{ match.stage or 'Fase de grupos' }}"></label>
        <label>Sede<input name="venue" value="{{ match.venue or 'Sede por confirmar' }}"></label>
        <label>Competicion<input name="competition" value="{{ match.competition or 'FIFA World Cup' }}"></label>
        <label>Temporada<input name="season" value="{{ match.season or '2026' }}"></label>
        <label>API ID futuro<input name="api_id" value="{{ match.api_id or '' }}" placeholder="Opcional"></label>
    </div>
    <div class="hero-actions">
        <button class="button primary" type="submit">Guardar partido</button>
        <a class="button ghost" href="{{ url_for('admin.matches') }}">Cancelar</a>
    </div>
</form>
{% endblock %}
